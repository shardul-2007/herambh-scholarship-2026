<!DOCTYPE html>
<html>
<head>
<title>Apply Scholarship</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Scholarship Application Form</h2>

<form id="appForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="text" id="college" placeholder="School / College Name">

<input type="number" id="marks" placeholder="Last Exam Percentage">

<input type="text" id="phone" placeholder="Mobile Number">

<button type="submit">Submit Application</button>

</form>

<p id="appID"></p>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Herambh Deval Memorial Scholarship</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Herambh Deval Memorial Scholarship</h1>
<p>Supporting Students for a Better Future</p>
</header>

<section class="about">
<h2>About Scholarship</h2>
<p>
The Herambh Deval Memorial Scholarship supports talented and hardworking students
who need financial help to continue their education.
</p>

<button onclick="showForm()">Apply Now</button>
</section>

<section id="applyForm" class="form-section">
<h2>Scholarship Application</h2>

<form id="scholarshipForm">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="text" placeholder="Mobile Number" required>

<input type="text" placeholder="College / School Name" required>

<input type="number" placeholder="Last Exam Percentage" required>

<textarea placeholder="Why do you deserve this scholarship?" required></textarea>

<button type="submit">Submit Application</button>

</form>

<p id="successMsg"></p>

</section>

<footer>
<p>© 2026 Herambh Deval Memorial Scholarship</p>
</footer>

<script src="script.js"></script>

</body>
</html>
